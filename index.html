<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아빠 힘내! 도희가 ❤️</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap');

        :root {
            --bg-color: #fff9fb;
            --primary: #ffb7b2; /* 파스텔 핑크 */
            --secondary: #b5ead7; /* 파스텔 민트 */
            --accent: #ffdac1; /* 파스텔 오렌지 */
            --text: #6d5d6e;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            font-family: 'Nanum Pen Script', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text);
            overflow: hidden;
        }

        #game-container {
            position: relative;
            margin-top: 20px;
        }

        canvas {
            background: #fff;
            border: 6px solid var(--primary);
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(255, 183, 178, 0.3);
            display: block;
        }

        /* UI 레이어 (로그인, 결과창) */
        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.96);
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 320px;
            z-index: 10;
            border: 3px dashed var(--primary);
        }

        h1 { color: var(--primary); font-size: 2.5rem; margin: 0 0 15px 0; }
        p { font-size: 1.5rem; margin-bottom: 15px; }
        
        input {
            padding: 10px;
            width: 80%;
            border: 2px solid var(--accent);
            border-radius: 15px;
            font-family: inherit;
            font-size: 1.5rem;
            text-align: center;
            outline: none;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 30px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.8rem;
            font-family: inherit;
            transition: 0.3s;
        }

        button:hover { transform: scale(1.1); background: #ff9aa2; }

        /* 랭킹 스타일 */
        #rank-box {
            margin-top: 15px;
            text-align: left;
            font-size: 1.2rem;
            max-height: 150px;
            overflow-y: auto;
        }

        .rank-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 10px;
            border-bottom: 1px solid #eee;
        }

        #score-display {
            font-size: 2rem;
            margin-top: 10px;
            color: var(--primary);
        }
    </style>
</head>
<body>

    <div id="score-display">아빠 힘내! 도희가 ❤️ 점수: <span id="liveScore">0</span></div>

    <div id="game-container">
        <div id="login-ui" class="overlay">
            <h1>응원 시작!</h1>
            <p>아빠의 이름을 입력해주세요</p>
            <input type="text" id="playerName" placeholder="멋쟁이 아빠" maxlength="10">
            <br>
            <button onclick="startApp()">게임 시작!</button>
        </div>

        <canvas id="gameCanvas" width="480" height="320"></canvas>

        <div id="result-ui" class="overlay" style="display: none;">
            <h1 id="result-msg">최고예요!</h1>
            <p>점수: <span id="finalScore">0</span>점</p>
            <hr>
            <h3>🏆 실시간 순위 (TOP 10)</h3>
            <div id="rank-box"></div>
            <br>
            <button onclick="location.reload()">다시 응원하기</button>
        </div>
    </div>

    <script>
        // --- [Firebase 설정] ---
        const firebaseConfig = {
          apiKey: "AIzaSyDJZEH7lq3AL818eU31rGSUf3uFIcSt1cE",
  authDomain: "dohee-father.firebaseapp.com",
  databaseURL: "https://dohee-father-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "dohee-father",
  storageBucket: "dohee-father.firebasestorage.app",
  messagingSenderId: "1082862450001",
  appId: "1:1082862450001:web:219220d546bc76b1954f70",
  measurementId: "G-RGXT7NQL0M"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // --- [게임 변수] ---
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        let score = 0;
        let pName = "";
        let isGameRunning = false;

        // 공/패들 데이터
        let x = canvas.width / 2;
        let y = canvas.height - 30;
        let dx = 3;
        let dy = -3;
        const ballRadius = 8;
        const paddleHeight = 15;
        const paddleWidth = 90;
        let paddleX = (canvas.width - paddleWidth) / 2;
        let rightPressed = false;
        let leftPressed = false;

        // 벽돌 데이터
        const rowCount = 4;
        const colCount = 5;
        const bWidth = 75;
        const bHeight = 20;
        const bPadding = 10;
        const bOffsetTop = 40;
        const bOffsetLeft = 35;
        let bricks = [];

        for(let c=0; c<colCount; c++) {
            bricks[c] = [];
            for(let r=0; r<rowCount; r++) {
                bricks[c][r] = { x: 0, y: 0, status: 1 };
            }
        }

        // 키보드 조작
        document.addEventListener("keydown", (e) => {
            if(e.key == "Right" || e.key == "ArrowRight") rightPressed = true;
            else if(e.key == "Left" || e.key == "ArrowLeft") leftPressed = true;
        });
        document.addEventListener("keyup", (e) => {
            if(e.key == "Right" || e.key == "ArrowRight") rightPressed = false;
            else if(e.key == "Left" || e.key == "ArrowLeft") leftPressed = false;
        });

        // --- [핵심 기능] ---
        function startApp() {
            pName = document.getElementById("playerName").value.trim();
            if(!pName) { alert("성함을 적어주세요! ❤️"); return; }
            document.getElementById("login-ui").style.display = "none";
            isGameRunning = true;
            draw();
        }

        function drawBall() {
            ctx.beginPath();
            ctx.arc(x, y, ballRadius, 0, Math.PI*2);
            ctx.fillStyle = "#ffb7b2";
            ctx.fill();
            ctx.closePath();
        }

        function drawPaddle() {
            ctx.beginPath();
            ctx.roundRect(paddleX, canvas.height - paddleHeight - 5, paddleWidth, paddleHeight, 8);
            ctx.fillStyle = "#b5ead7";
            ctx.fill();
            ctx.closePath();
        }

        function drawBricks() {
            for(let c=0; c<colCount; c++) {
                for(let r=0; r<rowCount; r++) {
                    if(bricks[c][r].status == 1) {
                        let bx = (c * (bWidth + bPadding)) + bOffsetLeft;
                        let by = (r * (bHeight + bPadding)) + bOffsetTop;
                        bricks[c][r].x = bx;
                        bricks[c][r].y = by;
                        ctx.beginPath();
                        ctx.roundRect(bx, by, bWidth, bHeight, 5);
                        ctx.fillStyle = (r % 2 == 0) ? "#ffdac1" : "#e2f0cb";
                        ctx.fill();
                        ctx.closePath();
                    }
                }
            }
        }

        function collision() {
            for(let c=0; c<colCount; c++) {
                for(let r=0; r<rowCount; r++) {
                    let b = bricks[c][r];
                    if(b.status == 1) {
                        if(x > b.x && x < b.x + bWidth && y > b.y && y < b.y + bHeight) {
                            dy = -dy;
                            b.status = 0;
                            score += 10;
                            document.getElementById("liveScore").innerText = score;
                            if(score == rowCount * colCount * 10) {
                                endGame("미션 성공! 아빠 짱");
                            }
                        }
                    }
                }
            }
        }

        function endGame(msg) {
            isGameRunning = false;
            document.getElementById("result-msg").innerText = msg;
            document.getElementById("finalScore").innerText = score;
            document.getElementById("result-ui").style.display = "block";
            
            // 점수 저장
            database.ref('ranking/').push({
                name: pName,
                score: score,
                time: Date.now()
            });
            fetchRankings();
        }

        function fetchRankings() {
            const rankRef = database.ref('ranking/').orderByChild('score').limitToLast(10);
            rankRef.on('value', (snap) => {
                const box = document.getElementById("rank-box");
                box.innerHTML = "";
                let arr = [];
                snap.forEach(child => { arr.push(child.val()); });
                arr.reverse().forEach((item, i) => {
                    box.innerHTML += `<div class="rank-item">
                        <span>${i+1}. ${item.name}</span>
                        <strong>${item.score}점</strong>
                    </div>`;
                });
            });
        }

        function draw() {
            if(!isGameRunning) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBricks();
            drawBall();
            drawPaddle();
            collision();

            if(x + dx > canvas.width - ballRadius || x + dx < ballRadius) dx = -dx;
            if(y + dy < ballRadius) dy = -dy;
            else if(y + dy > canvas.height - ballRadius - 5) {
                if(x > paddleX && x < paddleX + paddleWidth) {
                    dy = -dy;
                } else {
                    endGame("아빠 힘내세요! 다음에 더 잘할 수 있어요! 💪");
                    return;
                }
            }

            if(rightPressed && paddleX < canvas.width - paddleWidth) paddleX += 7;
            else if(leftPressed && paddleX > 0) paddleX -= 7;

            x += dx;
            y += dy;
            requestAnimationFrame(draw);
        }
    </script>
</body>
</html>
